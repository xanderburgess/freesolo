<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freesolo Asset Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400&family=Hanken+Grotesk:wght@500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sidebar-bg: #05081D;
    --preview-bg: #191F4C;
    --surface: transparent;
    --border: #1a1f3d;
    --border-hover: #2a3055;
    --text: #F5F6FA;
    --text-dim: #6b7196;
    --text-dimmer: #4a4f73;
    --accent: #57FF8F;
    --blue: #5F72FF;
  }

  html, body { height: 100%; }

  body {
    background: var(--sidebar-bg);
    color: var(--text);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    overflow: hidden;
  }

  .layout {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    padding: 28px 24px 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .logo-area {
    padding-bottom: 18px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .logo-area svg { display: block; }

  .logo-subtitle {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .section {
    margin-bottom: 22px;
  }

  .section-title {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ---------- Buttons (Dimensions / Distribution) ---------- */
  .btn-grid {
    display: flex;
    gap: 6px;
  }

  .grid-btn {
    flex: 1;
    padding: 9px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .grid-btn:hover {
    border-color: var(--border-hover);
  }

  .grid-btn.active {
    border-color: var(--blue);
    color: var(--text);
  }

  .dist-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .dist-grid .grid-btn {
    padding: 9px 4px;
    font-size: 11px;
  }

  /* ---------- Theme buttons ---------- */
  .theme-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }

  .theme-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 10px 10px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .theme-btn:hover { border-color: var(--border-hover); }
  .theme-btn.active { border-color: var(--blue); }

  .theme-swatch {
    display: flex;
    width: 100%;
    height: 22px;
    border-radius: 0;
    overflow: hidden;
  }

  .theme-swatch .sw-light { flex: 1; }
  .theme-swatch .sw-dark  { flex: 1; }

  /* ---------- Checkboxes ---------- */
  .check-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 9px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }

  .checkbox-label input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid var(--text-dim);
    border-radius: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .checkbox-label input[type="checkbox"]:hover {
    border-color: var(--text);
  }

  .checkbox-label input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox-label input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 0px;
    width: 4px;
    height: 8px;
    border: solid #05081D;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  /* ---------- Action buttons ---------- */
  .actions {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 20px;
  }

  .btn {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid transparent;
    border-radius: 0;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .btn-primary {
    background: var(--accent);
    color: #05081D;
    border-color: var(--accent);
  }

  .btn-primary:hover {
    filter: brightness(1.08);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--text); }

  .footer {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    font-family: 'Geist Mono', monospace;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-dimmer);
    text-transform: uppercase;
    text-align: center;
  }

  /* ---------- Sliders / Control rows ---------- */
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-row label {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: var(--text);
    flex: 0 0 78px;
    min-width: 0;
  }

  .control-row input[type="range"] {
    flex: 1;
    min-width: 0;
    accent-color: var(--blue);
    height: 3px;
    cursor: pointer;
  }

  .control-row .value {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--blue);
    flex: 0 0 32px;
    text-align: right;
  }

  /* Advanced dropdown */
  .advanced-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    transition: color 0.15s ease;
  }

  .advanced-toggle:hover { color: var(--text); }

  .advanced-toggle .arrow {
    transition: transform 0.2s ease;
    font-size: 9px;
    display: inline-block;
  }

  .advanced-toggle.open .arrow {
    transform: rotate(90deg);
  }

  .advanced-content {
    display: none;
    padding-top: 14px;
  }

  .advanced-content.open {
    display: block;
  }

  /* ---------- Preview area ---------- */
  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px;
    background: #ffffff;
    overflow: hidden;
  }

  .preview-container {
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-container svg {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 200px);
    width: auto;
    height: auto;
  }

</style>
</head>

<script>
const THEMES = {
  purple: { bg: '#191F4C', primary: '#5F72FF' },
  green:  { bg: '#0A363A', primary: '#57FF8F' },
  pink:   { bg: '#5A1F37', primary: '#FF91FE' },
};

let currentTheme = 'purple';

// --- UI helpers ---
function updateVal(el, suffix) {
  document.getElementById(el.id + '-val').textContent = el.value + (suffix || '');
}

function toggleAdvanced() {
  const toggle = document.getElementById('advancedToggle');
  const content = document.getElementById('advancedContent');
  toggle.classList.toggle('open');
  content.classList.toggle('open');
}

function applyTheme(name, btn) {
  currentTheme = name;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

function updatePreviewBg() {
  // Preview canvas stays white — no-op kept for compatibility
}

function setDim(w, h, btn) {
  document.getElementById('svgW').value = w;
  document.getElementById('svgH').value = h;
  document.querySelectorAll('[data-dim]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

function setDist(val, btn) {
  document.getElementById('distribution').value = val;
  document.querySelectorAll('.dist-grid .grid-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  generate();
}

// --- Seeded PRNG ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

// --- Distribution weight functions ---
// Returns a 0..1 multiplier where 0 = never fill, 1 = full fill probability.
// Strong contrast between "in the zone" and "out of the zone" so the
// distribution choice is actually visible.
function getDistributionWeight(dist, colFrac, rowFrac) {
  switch (dist) {
    case 'even':
      return 1;

    case 'edge-heavy': {
      // Distance from center, normalized to 0..1
      const dx = Math.abs(colFrac - 0.5) * 2;
      const dy = Math.abs(rowFrac - 0.5) * 2;
      const d = Math.max(dx, dy);
      // Sharp falloff: middle ~0.05, edges 1.0
      return Math.max(0.05, Math.pow(d, 1.5));
    }

    case 'top-heavy': {
      // Strong top bias: row 0 = 1.0, bottom row = 0.05
      return Math.max(0.05, Math.pow(1 - rowFrac, 1.4));
    }

    case 'bottom-heavy': {
      return Math.max(0.05, Math.pow(rowFrac, 1.4));
    }

    case 'diagonal': {
      // Heavy along the top-left → bottom-right diagonal
      const diagDist = Math.abs(colFrac - rowFrac);
      return Math.max(0.05, Math.pow(1 - diagDist, 1.5));
    }

    case 'diagonal-inv': {
      // Heavy along the bottom-left → top-right diagonal
      const diagDist = Math.abs(colFrac - (1 - rowFrac));
      return Math.max(0.05, Math.pow(1 - diagDist, 1.5));
    }

    default:
      return 1;
  }
}

// --- Core generator ---
function generatePattern(seed) {
  const W = parseInt(document.getElementById('svgW').value) || 1080;
  const H = parseInt(document.getElementById('svgH').value) || 1080;
  const numCols = parseInt(document.getElementById('numCols').value);
  const widthTaper = parseInt(document.getElementById('widthTaper').value) / 100;
  const rowCount = parseInt(document.getElementById('rowCount').value);
  const heightVar = parseInt(document.getElementById('heightVar').value) / 100;
  const fillAmount = parseInt(document.getElementById('fillAmount').value) / 100;
  const useAccent = document.getElementById('useAccent').checked;
  const accentRatio = useAccent ? parseInt(document.getElementById('accentRatio').value) / 100 : 0;
  const distribution = document.getElementById('distribution').value;

  const theme = THEMES[currentTheme];
  const inverse = document.getElementById('useInverse').checked;
  const colorBg = inverse ? theme.primary : theme.bg;
  const colorPrimary = inverse ? theme.bg : theme.primary;
  const colorAccent = '#57FF8F';

  const rng = mulberry32(seed);

  // Column widths — exponential decay (original character).
  // The taper only affects visual width, not fill density,
  // so distribution patterns remain visible.
  let colWidths = [];
  for (let i = 0; i < numCols; i++) {
    const t = i / Math.max(1, numCols - 1);
    const k = widthTaper * 3.5;
    const taper = Math.exp(-k * t);
    const jitter = 0.92 + rng() * 0.16;
    colWidths.push(taper * jitter);
  }

  const totalRatio = colWidths.reduce((a, b) => a + b, 0);
  let colXs = [];
  let colWsPx = [];
  let cumW = 0;
  for (let i = 0; i < numCols; i++) {
    const xStart = Math.round(cumW / totalRatio * W);
    cumW += colWidths[i];
    const xEnd = i === numCols - 1 ? W : Math.round(cumW / totalRatio * W);
    colXs.push(xStart);
    colWsPx.push(xEnd - xStart);
  }

  let rects = [];
  let prevColFilled = [];

  for (let ci = 0; ci < numCols; ci++) {
    const colFrac = numCols > 1 ? ci / (numCols - 1) : 0.5;
    const colW = colWsPx[ci];

    // All columns get same row count for predictable distribution
    const colRowCount = rowCount;
    const phaseOffset = rng() * 0.5;

    let rowHeights = [];
    const baseH = H / colRowCount;
    for (let ri = 0; ri < colRowCount; ri++) {
      const variance = 1 + (rng() * 2 - 1) * heightVar * 0.6;
      let h = baseH * Math.max(0.4, variance);
      if (ri === 0) h *= (1 - phaseOffset);
      rowHeights.push(h);
    }

    const totalH = rowHeights.reduce((a, b) => a + b, 0);
    let rows = [];
    let cumulative = 0;
    for (let ri = 0; ri < colRowCount; ri++) {
      const yStart = Math.round(cumulative / totalH * H);
      cumulative += rowHeights[ri];
      const yEnd = ri === colRowCount - 1 ? H : Math.round(cumulative / totalH * H);
      rows.push({ y: yStart, h: yEnd - yStart });
    }

    let prevFilled = false;
    const colFilledBlocks = [];

    for (let ri = 0; ri < colRowCount; ri++) {
      const rowFrac = colRowCount > 1 ? ri / (colRowCount - 1) : 0.5;
      const weight = getDistributionWeight(distribution, colFrac, rowFrac);
      // Probability is fillAmount * distribution weight (no width dampen).
      const prob = fillAmount * weight;

      const roll = rng();
      const accentRoll = rng();

      if (!prevFilled && roll < prob) {
        const blockY = rows[ri].y;
        const blockH = rows[ri].h;
        const blockBottom = blockY + blockH;

        let maxOverlap = 0;
        if (ci > 0 && prevColFilled.length > 0) {
          for (const prev of prevColFilled) {
            const overlapTop = Math.max(blockY, prev.y);
            const overlapBot = Math.min(blockBottom, prev.y + prev.h);
            if (overlapBot > overlapTop) {
              const overlapAmount = (overlapBot - overlapTop) / Math.min(blockH, prev.h);
              maxOverlap = Math.max(maxOverlap, overlapAmount);
            }
          }
        }

        if (maxOverlap < 0.5) {
          const isAccent = accentRoll < accentRatio;
          rects.push({
            x: colXs[ci],
            y: blockY,
            w: colWsPx[ci],
            h: blockH,
            color: isAccent ? colorAccent : colorPrimary
          });
          colFilledBlocks.push({ y: blockY, h: blockH });
          prevFilled = true;
        } else {
          prevFilled = false;
        }
      } else {
        prevFilled = false;
      }
    }
    prevColFilled = colFilledBlocks;
  }

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" shape-rendering="crispEdges">\n`;
  svg += `<rect width="${W}" height="${H}" fill="${colorBg}"/>\n`;
  for (const r of rects) {
    svg += `<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${r.color}"/>\n`;
  }
  svg += `</svg>`;
  return svg;
}

// --- UI state ---
let currentSeed = Math.floor(Math.random() * 999999);

function generate() {
  currentSeed = Math.floor(Math.random() * 999999);
  updatePreviewBg();
  render();
}

function render() {
  const container = document.getElementById('preview-container');
  container.innerHTML = generatePattern(currentSeed);
}

function copySVG() {
  const svg = generatePattern(currentSeed);
  navigator.clipboard.writeText(svg).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = 'Copy SVG', 1200);
  });
}

// Spacebar to regenerate
document.addEventListener('keydown', e => {
  if (e.key === ' ' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
    e.preventDefault();
    generate();
  }
});

updatePreviewBg();
render();
</script>
